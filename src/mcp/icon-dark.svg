<!-- 2x2 grid: pipe | PR | bucket | <> — dark badge -->
<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">

  <rect width="200" height="200" rx="28" fill="#111"/>

  <!-- Subtle grid dividers -->
  <line x1="100" y1="14" x2="100" y2="186" stroke="#333" stroke-width="1"/>
  <line x1="14" y1="100" x2="186" y2="100" stroke="#333" stroke-width="1"/>

  <!-- TOP-LEFT: Pipe / cylinder (center 50,50) -->
  <ellipse cx="50" cy="28" rx="16" ry="6" stroke="white" stroke-width="5.5"/>
  <line x1="34" y1="28" x2="34" y2="72" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="66" y1="28" x2="66" y2="72" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <ellipse cx="50" cy="72" rx="16" ry="6" stroke="white" stroke-width="5.5"/>

  <!-- TOP-RIGHT: PR (center 150,50) -->
  <text x="150" y="65" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="40" fill="white">PR</text>

  <!-- BOTTOM-LEFT: Bucket (center 50,150) -->
  <path d="M38,138 Q50,120 62,138" stroke="white" stroke-width="5.5" stroke-linecap="round" fill="none"/>
  <path d="M28,140 L36,178 L64,178 L72,140" stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="28" y1="140" x2="72" y2="140" stroke="white" stroke-width="5.5" stroke-linecap="round"/>

  <!-- BOTTOM-RIGHT: <> (center 150,150) -->
  <polyline points="144,124 122,150 144,176" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="156,124 178,150 156,176" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

</svg>
